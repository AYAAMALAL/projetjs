<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Liste des Examens</title>
</head>
<body>
    <h1>Examens enregistrés</h1>
    <input type="text" id="proprietaire" placeholder="Nom du propriétaire">
    <button id="afficher">Afficher</button>
    <div id="resultat"></div>

    <script>
        document.getElementById('afficher').addEventListener('click', () => {
            const owner = document.getElementById('proprietaire').value;
            const key = 'examens_' + owner;
            const exams = JSON.parse(localStorage.getItem(key)) || [];

            const res = document.getElementById('resultat');
            res.innerHTML = '';

            if (exams.length === 0) {
                res.innerHTML = '<p>Aucun examen trouvé.</p>';
                return;
            }

            exams.forEach((exam, i) => {
                const div = document.createElement('div');
                div.innerHTML = `<h3>${i+1}. ${exam.nom} (${exam.duree} min)</h3>`;
                const ul = document.createElement('ul');
                exam.questions.forEach(q => {
                    const li = document.createElement('li');
                    li.textContent = `${q.enonce} (${q.points} pts)`;
                    ul.appendChild(li);
                });
                div.appendChild(ul);
                res.appendChild(div);
            });
        });
    </script>
</body>
</html>
